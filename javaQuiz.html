<!DOCTYPE html>
<html>
<head>
    <title>Java Quiz</title>
    <link rel="stylesheet" href="javaQuiz.css">
</head>
<body>
<h1>Java Quiz</h1>

<h2 id="question"></h2>

<button onclick="checkAnswer(0)" id="op1"></button><br><br>
<button onclick="checkAnswer(1)" id="op2"></button><br><br>
<button onclick="checkAnswer(2)" id="op3"></button><br><br>
<button onclick="checkAnswer(3)" id="op4"></button>

<p id="result"></p>

<script>

const quiz = [
{
    question: "What is Java?",
    options: [
        "Programming Language",
        "Database",
        "Browser",
        "Operating System"
    ],
    answer: 0
},
{
    question: "Which keyword creates an object?",
    options: [
        "create",
        "object",
        "new",
        "make"
    ],
    answer: 2
},
{
    question: "Which method is the entry point of a Java program?",
    options: [
        "start()",
        "main()",
        "run()",
        "init()"
    ],
    answer: 1
},
{
    question: "Java is a _____ language.",
    options: [
        "Procedural",
        "Machine",
        "Object-Oriented",
        "Assembly"
    ],
    answer: 2
},
{
    question: "Which symbol is used to end a statement in Java?",
    options: [
        ":",
        ".",
        ";",
        ","
    ],
    answer: 2
},
{
    question: "Which package contains Scanner class?",
    options: [
        "java.io",
        "java.util",
        "java.lang",
        "java.net"
    ],
    answer: 1
},
{
    question: "Which data type stores whole numbers?",
    options: [
        "String",
        "boolean",
        "int",
        "char"
    ],
    answer: 2
},
{
    question: "Which loop executes at least once?",
    options: [
        "for",
        "while",
        "do-while",
        "foreach"
    ],
    answer: 2
},
{
    question: "Which keyword is used for inheritance?",
    options: [
        "implements",
        "extends",
        "inherits",
        "super"
    ],
    answer: 1
},
{
    question: "Which of these is not a Java primitive data type?",
    options: [
        "int",
        "float",
        "String",
        "char"
    ],
    answer: 2
}
];
let currentQuestion = 0;
let score = 0;
function loadQuestion() {

    document.getElementById("question").innerHTML =
        quiz[currentQuestion].question;

    document.getElementById("op1").innerHTML =
        quiz[currentQuestion].options[0];

    document.getElementById("op2").innerHTML =
        quiz[currentQuestion].options[1];

    document.getElementById("op3").innerHTML =
        quiz[currentQuestion].options[2];

    document.getElementById("op4").innerHTML =
        quiz[currentQuestion].options[3];

    document.getElementById("result").innerHTML = "";
}

function checkAnswer(selected) {

    if(selected === quiz[currentQuestion].answer){
        score++;
        document.getElementById("result").innerHTML =
            "✅ Correct!";
    } else {
        document.getElementById("result").innerHTML =
            "❌ Wrong!";
    }

    setTimeout(() => {

        currentQuestion++;

        if(currentQuestion < quiz.length){
            loadQuestion();
        } else {

    document.body.innerHTML = `
    <div class="result-container">

        <h1>Quiz Completed 🎉</h1>

        <h2>Your Score: ${score} / ${quiz.length}</h2>

        <h3>Feedback</h3>

        <textarea id="feedback"
        placeholder="Enter your feedback here..."
        rows="5"
        cols="40"></textarea>

        <br><br>

        <button onclick="submitFeedback()">
            Submit Feedback
        </button>

        <br><br>

        <button onclick="window.location.href='quiz.html'">
            Back to Quiz Selection
        </button>

    </div>
    `;
        }

    }, 1000);
}
function submitFeedback() {

    let feedback =
        document.getElementById("feedback").value;

    if(feedback.trim() === "") {
        alert("Please enter feedback.");
        return;
    }

    alert("Thank you for your feedback!");

    console.log("Feedback:", feedback);
}

loadQuestion();

</script>

</body>
</html>
